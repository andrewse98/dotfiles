"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$fill\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rlang\
$rust\
$scala\
$conda\
$python\
$time\n\
$character
"""

add_newline = false

palette = "rose-pine"

[palettes.rose-pine-dawn]
overlay = '#f2e9e1'
love = '#b4637a'
gold = '#ea9d34'
rose = '#d7827e'
pine = '#286983'
foam = '#56949f'
iris = '#907aa9'

[palettes.rose-pine]
overlay = '#26233a'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ebbcba'
pine = '#31748f'
foam = '#9ccfd8'
iris = '#c4a7e7'

[palettes.rose-pine-moon]
overlay = '#393552'
love = '#eb6f92'
gold = '#f6c177'
rose = '#ea9a97'
pine = '#3e8fb0'
foam = '#9ccfd8'
iris = '#c4a7e7'


[character]
success_symbol = '[❯](foam)'
error_symbol = '[❯](love)'

[directory]
format = "[$path ]($style)"
style = "fg:pine"
truncation_length = 2
truncation_symbol = "…/"

# [directory.substitutions]
# Documents = "󰈙 "
# Downloads = " "
# Music = " "
# Pictures = " "

[fill]
symbol = " "

[git_branch]
format = "[$symbol $branch ]($style)"
style = "fg:foam"
symbol = ""

[git_status]
disabled = false
style = "fg:love"
format = '([$all_status$ahead_behind]($style)) '
up_to_date = '[ ✓ ](fg:iris)'
untracked = '[?\($count\)](fg:gold)'
stashed = '[\$](fg:iris)'
modified = '[!\($count\)](fg:gold)'
renamed = '[»\($count\)](fg:iris)'
deleted = '[✘\($count\)](style)'
staged = '[++\($count\)](fg:gold)'
ahead = '[⇡\(${count}\)](fg:foam)'
diverged = '⇕[\[](fg:iris)[⇡\(${ahead_count}\)](fg:foam)[⇣\(${behind_count}\)](fg:rose)[\]](fg:iris)'
behind = '[⇣\(${count}\)](fg:rose)'

[time]
disabled = false
format = " [ $time]($style)"
style = "fg:rose"
time_format = "%I:%M%P"
use_12hr = true

[username]
disabled = false
format = "[$user ]($style) "
show_always = true
style_root = "fg:iris"
style_user = "fg:iris"

# Languages

[c]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[elixir]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[elm]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[golang]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[haskell]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[java]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[julia]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[nodejs]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = "󰎙 "

[nim]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = "󰆥 "

[rlang]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = "󰟔 "

[rust]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[scala]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = " "

[python]
style = "fg:pine"
format = " [ $symbol$version ]($style)"
disabled = false
symbol = ' '

[conda]
style = "fg:pine"
format = " [ $symbol$environment ]($style)"
disabled = false
symbol = '🅒 '

[os]
disabled = false
format = "[$symbol]($style)"
style= "fg:pine"

[os.symbols]
Fedora = " "
Windows = "󰍲 "
