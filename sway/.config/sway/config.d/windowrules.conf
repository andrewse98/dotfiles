# Inhibit idle in fullscreen
for_window [all] inhibit_idle fullscreen

# Floating windows
for_window [floating] move position center, sticky disable

for_window [window_role="pop-up"] floating enable
for_window [window_role="Pop-up"] floating enable

for_window [window_role="bubble"] floating enable
for_window [window_role="Bubble"] floating enable

for_window [window_role="dialog"] floating enable
for_window [window_role="Dialog"] floating enable

for_window [window_type="dialog"] floating enable
for_window [window_type="Dialog"] floating enable

for_window [class="dialog"] floating enable
for_window [class="Dialog"] floating enable

for_window [window_role="task_dialog"] floating enable
for_window [window_type="menu"] floating enable
for_window [window_role="About"] floating enable

for_window [app_id="floating"] floating enable
for_window [app_id="floating_update"] floating enable, resize set width 1000px height 600px

for_window [title="^Picture-in-Picture$"] floating enable
for_window [title="^Emulator$"] floating enable

# Focus latest spawned window
for_window [shell=".*"] focus

# Apps
# Device manager
for_window  [app_id="blueman-manager"] floating enable, floating_maximum_size 960 x 540
for_window  [app_id="org.pulseaudio.pavucontrol"] floating enable, floating_maximum_size 960 x 540

# Dolphin
for_window  [app_id="org.kde.dolphin"] floating enable

# Flameshot
for_window  [app_id="flameshot"] border pixel 0, floating enable, 

# Zotero
for_window  [app_id="Zotero" title="Settings$"] floating enable

# Zoom
for_window  [class="zoom" title="^zoom$"] border none, floating enable
for_window  [class="zoom" title="^(Zoom|About)$"] border pixel, floating enable
for_window  [class="zoom" title="^Zoom Workplace$"] border pixel, floating enable
for_window  [class="zoom" title="chat$"] border pixel, floating enable
for_window  [class="zoom" title="Settings"] floating enable, floating_minimum_size 960 x 700
for_window  [class="zoom" title="Zoom Meeting(.*)?"] workspace next_on_output --create, move container to workspace current, floating disable, inhibit_idle open




