# Wallpaper
output * bg ~/.config/sway/wallpapers/bay.jpg fill

# Title bar
title_align center
font pango: Noto Sans Nerd Font 12
for_window [app_id="^.*"] title_format "%title"
for_window [class="^.*"] title_format "%title"

# Border style
default_border pixel 1.5
titlebar_padding 8 1
titlebar_border_thickness 1

# Gaps
gaps outer 0
gaps top 0
gaps inner 0

# Colors
set $base     #191724
set $surface  #1f1d2e
set $overlay  #26233a
set $muted    #6e6a86
set $subtle   #908caa
set $text     #e0def4
set $love     #eb6f92
set $gold     #f6c177
set $rose     #ebbcba
set $pine     #31748f
set $foam     #9ccfd8
set $iris     #c4a7e7

# class                   border      background    text      indicator   child_border
client.focused            $rose       $rose         $base     $rose
client.focused_inactive   $overlay    $overlay      $subtle   $overlay
client.unfocused          $overlay    $base         $muted    $overlay
client.urgent             $love       $love         $base     $love
